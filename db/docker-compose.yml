services:
  mysql:
    build: .
    container_name: tenanttrails-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tenanttrails
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-proot1234", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: